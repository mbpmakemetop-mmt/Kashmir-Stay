<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  /* Core palette — deep Kashmir night sky + glacial teal + warm saffron */
  --void:#060610;
  --deep:#0A0A1A;
  --panel:#0E0E20;
  --card:#141428;
  --lift:#1C1C38;
  --edge:rgba(255,255,255,.05);
  --edge2:rgba(255,255,255,.09);
  --edge3:rgba(255,255,255,.14);

  /* Brand accents */
  --sky:#4F8EF7;      /* Kashmir blue sky */
  --sky2:#7AB3FF;
  --teal:#2DD4BF;     /* Glacial stream */
  --saffron:#F59E0B;  /* Kashmir saffron */
  --saffron2:#FCD34D;
  --rose:#FB7185;
  --glow-sky:rgba(79,142,247,.2);
  --glow-teal:rgba(45,212,191,.15);
  --glow-sf:rgba(245,158,11,.15);

  /* Text */
  --txt:#EDF2FF;
  --txt2:rgba(237,242,255,.65);
  --txt3:rgba(237,242,255,.38);
  --txt4:rgba(237,242,255,.18);

  /* Typography */
  --display:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;

  --r:14px;--r2:10px;--r3:8px;--pill:999px;
}

html,body{height:100%;font-family:var(--body);background:var(--void);color:var(--txt);overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* Layered atmospheric background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 0%,rgba(79,142,247,.1) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 100%,rgba(45,212,191,.07) 0%,transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(245,158,11,.04) 0%,transparent 60%);
}
/* Grain texture overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:256px;
}

/* ═══ LAYOUT ═══ */
.shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:640px;margin:0 auto;background:var(--panel)}
@media(min-width:640px){
  .shell{border-left:1px solid var(--edge2);border-right:1px solid var(--edge2);box-shadow:0 0 120px rgba(79,142,247,.07),0 0 60px rgba(45,212,191,.04)}
}

/* ═══ AUTH GATE ═══ */
#auth-gate{
  position:absolute;inset:0;z-index:200;
  background:linear-gradient(170deg,#06061a 0%,#0a0a1e 40%,#060610 100%);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 20px;text-align:center;
  overflow-y:auto;
}
#auth-gate.show{display:flex}

/* Floating mountain silhouette decoration */
.auth-deco{
  position:absolute;bottom:0;left:0;right:0;height:220px;pointer-events:none;overflow:hidden;
}
.auth-deco svg{width:100%;height:100%;display:block}

.ag-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:var(--pill);
  border:1px solid rgba(79,142,247,.25);
  background:rgba(79,142,247,.08);
  font-size:.65rem;font-weight:600;color:var(--sky2);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:20px;
}
.ag-logo{
  font-family:var(--display);font-size:2rem;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,#fff 20%,var(--sky) 55%,var(--teal) 90%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ag-logo em{-webkit-text-fill-color:var(--saffron);font-style:normal}
.ag-sub{font-size:.8rem;color:var(--txt3);margin-bottom:28px;line-height:1.6;max-width:280px}

.ag-card{
  background:linear-gradient(145deg,rgba(20,20,40,.95),rgba(14,14,30,.98));
  border:1px solid var(--edge3);border-radius:20px;
  padding:24px 22px;width:100%;max-width:380px;
  box-shadow:0 0 80px rgba(79,142,247,.1),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;z-index:2;
}
.ag-card h2{font-family:var(--display);font-size:1rem;font-weight:700;margin-bottom:5px}
.ag-card .sub{font-size:.79rem;color:var(--txt2);margin-bottom:20px;line-height:1.6}

.ag-err{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.2);border-radius:var(--r3);padding:9px 12px;font-size:.78rem;color:var(--rose);margin-bottom:10px;display:none}
.ag-err.show{display:block}

.g-btn{
  width:100%;padding:12px;background:#fff;color:#1a1a1a;
  border:none;border-radius:var(--r2);
  font-family:var(--body);font-size:.86rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  margin-bottom:12px;transition:.2s;
}
.g-btn:hover{background:#F0F0F0;transform:translateY(-1px)}
.g-btn:active{transform:translateY(0)}

.or-sep{display:flex;align-items:center;gap:9px;margin:2px 0 12px}
.or-sep::before,.or-sep::after{content:'';flex:1;height:1px;background:var(--edge2)}
.or-sep span{font-size:.65rem;color:var(--txt4);text-transform:uppercase;letter-spacing:.1em}

.ai-in{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,.04);border:1px solid var(--edge2);
  border-radius:var(--r2);font-family:var(--body);font-size:.86rem;color:var(--txt);
  outline:none;margin-bottom:9px;transition:.2s;
}
.ai-in:focus{border-color:rgba(79,142,247,.5);background:rgba(79,142,247,.04)}
.ai-in::placeholder{color:var(--txt4)}

.ai-btn-p{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--sky),#6B9FFF,var(--teal));
  background-size:200% 200%;
  color:#fff;border:none;border-radius:var(--r2);
  font-family:var(--body);font-size:.88rem;font-weight:600;cursor:pointer;
  transition:.25s;box-shadow:0 4px 20px rgba(79,142,247,.3);
}
.ai-btn-p:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 6px 28px rgba(79,142,247,.4)}
.ai-btn-p:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.ag-tog{font-size:.77rem;color:var(--txt3);margin-top:12px}
.ag-tog a{color:var(--sky2);cursor:pointer;font-weight:600}
.ag-guest{
  margin-top:18px;font-size:.73rem;color:var(--txt3);cursor:pointer;
  background:none;border:1px solid var(--edge2);border-radius:var(--pill);
  font-family:var(--body);padding:7px 18px;transition:.2s;position:relative;z-index:2;
}
.ag-guest:hover{color:var(--txt2);border-color:var(--edge3)}

/* ═══ HEADER ═══ */
.hdr{
  background:rgba(14,14,32,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--edge);
  padding:11px 16px;
  padding-top:calc(11px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(79,142,247,.3),rgba(45,212,191,.2),transparent);
}

.hdr-back{
  width:34px;height:34px;border-radius:10px;
  background:var(--edge);border:1px solid var(--edge2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:.15s;
}
.hdr-back:hover{background:var(--edge2)}
.hdr-back svg{stroke:var(--txt2)}

.ai-av{
  width:36px;height:36px;border-radius:12px;
  background:linear-gradient(135deg,var(--sky),var(--teal));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
  box-shadow:0 0 20px var(--glow-sky);
}
.ai-av::after{
  content:'';position:absolute;inset:-3px;border-radius:14px;
  border:1px solid rgba(79,142,247,.3);pointer-events:none;
}
.ai-av svg{stroke:#fff;width:16px;height:16px}

.hdr-info{flex:1;min-width:0}
.hdr-info h1{font-family:var(--display);font-size:.9rem;font-weight:700;letter-spacing:-.2px}
.hdr-st{font-size:.62rem;color:var(--txt3);display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);flex-shrink:0;transition:.3s}
.sdot.off{background:var(--txt4);box-shadow:none}

.hdr-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hpill{
  height:28px;padding:0 12px;border-radius:var(--pill);
  background:var(--edge);border:1px solid var(--edge2);
  color:var(--txt2);font-family:var(--body);font-size:.68rem;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:.15s;
}
.hpill:hover{background:var(--edge2);color:var(--txt)}

.u-chip{display:none;align-items:center;gap:5px;padding:3px 9px 3px 3px;background:var(--edge);border:1px solid var(--edge2);border-radius:var(--pill)}
.u-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--sky),var(--teal));color:#fff;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.u-av img{width:100%;height:100%;object-fit:cover;display:none}
.u-nm{font-size:.68rem;font-weight:600;color:var(--txt2);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══ TABS ═══ */
.ftabs{
  display:flex;padding:10px 14px 11px;gap:6px;overflow-x:auto;scrollbar-width:none;
  background:rgba(14,14,32,.7);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--edge);flex-shrink:0;
}
.ftabs::-webkit-scrollbar{display:none}

.ftab{
  flex-shrink:0;padding:6px 13px;border-radius:var(--pill);
  border:1px solid var(--edge2);background:transparent;
  font-family:var(--body);font-size:.72rem;font-weight:600;color:var(--txt3);
  cursor:pointer;white-space:nowrap;transition:.2s;
  display:flex;align-items:center;gap:5px;
}
.ftab.on{
  background:linear-gradient(135deg,var(--sky),var(--teal));
  border-color:transparent;color:#fff;
  box-shadow:0 2px 16px var(--glow-sky);
}
.ftab:hover:not(.on){background:var(--edge2);color:var(--txt2)}

/* ═══ PANELS ═══ */
.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.on{display:flex}

/* ═══ CHAT ═══ */
#chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:13px;-webkit-overflow-scrolling:touch}
#chat-area::-webkit-scrollbar{width:3px}
#chat-area::-webkit-scrollbar-thumb{background:var(--edge2);border-radius:2px}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;margin:auto 0;padding:20px 16px}
.worb{
  width:76px;height:76px;border-radius:22px;
  background:linear-gradient(135deg,var(--sky),#5B9EFF,var(--teal));
  box-shadow:0 0 60px var(--glow-sky),0 0 30px var(--glow-teal);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;position:relative;
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 40px var(--glow-sky),0 0 20px var(--glow-teal)}
  50%{box-shadow:0 0 70px var(--glow-sky),0 0 40px var(--glow-teal)}
}
.worb::before{
  content:'';position:absolute;inset:-6px;border-radius:26px;
  border:1px solid rgba(79,142,247,.2);animation:orbit 6s linear infinite;
}
.worb::after{
  content:'';position:absolute;inset:-14px;border-radius:30px;
  border:1px dashed rgba(45,212,191,.12);animation:orbit 10s linear infinite reverse;
}
@keyframes orbit{to{transform:rotate(360deg)}}
.worb svg{stroke:#fff;width:32px;height:32px}

.welcome h2{font-family:var(--display);font-size:1.3rem;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
.ai-nm{background:linear-gradient(135deg,var(--sky),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome .wsub{font-size:.82rem;color:var(--txt2);line-height:1.7;max-width:280px;margin:0 auto 22px}

/* Quick action cards — 2x3 grid */
.caps{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px;margin:0 auto 16px}
.cap{
  background:var(--card);border:1px solid var(--edge2);border-radius:12px;
  padding:11px 13px;display:flex;align-items:center;gap:8px;
  font-size:.75rem;font-weight:600;color:var(--txt2);cursor:pointer;
  transition:.2s;text-align:left;
}
.cap:hover{border-color:rgba(79,142,247,.35);color:var(--txt);background:rgba(79,142,247,.07);transform:translateY(-1px)}
.cap:active{transform:translateY(0)}
.ci{font-size:1rem;flex-shrink:0}

/* Destination quick pills */
.dest-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:340px;margin:0 auto 16px}
.dest-pill{
  padding:4px 12px;border-radius:var(--pill);border:1px solid var(--edge2);
  font-size:.65rem;font-weight:600;color:var(--txt3);cursor:pointer;background:var(--card);
  transition:.2s;white-space:nowrap;
}
.dest-pill:hover{border-color:rgba(245,158,11,.4);color:var(--saffron);background:rgba(245,158,11,.06)}

.gnote{padding:10px 14px;background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.18);border-radius:var(--r2);font-size:.74rem;color:var(--txt2);line-height:1.55;text-align:center}
.gnote a{color:var(--sky2);cursor:pointer;font-weight:600}

/* Messages */
.row{display:flex;gap:9px;align-items:flex-end}
.row.u{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:700;background:linear-gradient(135deg,var(--sky),var(--teal));box-shadow:0 0 10px var(--glow-sky)}
.av.mine{background:var(--card);border:1px solid var(--edge2);color:var(--txt2);overflow:hidden;border-radius:9px}
.av.mine img{width:100%;height:100%;object-fit:cover;display:none}
.bwrap{display:flex;flex-direction:column;max-width:80%;gap:3px}
.bbl{padding:11px 14px;border-radius:16px;font-size:.855rem;line-height:1.65;word-break:break-word}
.bbl.ai{background:var(--card);border:1px solid var(--edge2);color:var(--txt);border-bottom-left-radius:4px}
.bbl.me{background:linear-gradient(135deg,var(--sky),#5B9EFF);color:#fff;border-bottom-right-radius:4px;box-shadow:0 3px 16px var(--glow-sky)}
.bbl.sys{background:transparent;border:1px solid var(--edge2);color:var(--txt3);font-size:.7rem;text-align:center;border-radius:var(--pill);padding:5px 14px;align-self:center;max-width:95%}
.bbl code{font-family:var(--mono);font-size:.77rem;background:rgba(79,142,247,.12);border-radius:4px;padding:1px 5px;color:var(--sky2)}
.bbl pre{font-family:var(--mono);font-size:.74rem;background:rgba(0,0,0,.4);border-radius:10px;padding:11px 13px;overflow-x:auto;margin-top:8px;border:1px solid var(--edge2);white-space:pre-wrap}
.bbl ul,.bbl ol{padding-left:18px;margin:6px 0}.bbl li{margin-bottom:4px}
.bbl h3,.bbl h4{font-family:var(--display);font-weight:700;margin:9px 0 5px}
.meta{font-size:.6rem;color:var(--txt4);font-family:var(--mono)}
.row.u .meta{text-align:right}

/* Typing indicator */
.trow{display:flex;gap:9px;align-items:flex-end}
.tbub{padding:12px 16px;background:var(--card);border:1px solid var(--edge2);border-radius:16px;border-bottom-left-radius:4px;display:flex;gap:5px;align-items:center}
.tbub span{width:5px;height:5px;border-radius:50%;background:var(--sky);animation:td .9s ease-in-out infinite}
.tbub span:nth-child(2){animation-delay:.18s}.tbub span:nth-child(3){animation-delay:.36s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* Suggestion chips */
.sugs{padding:8px 14px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.sugs::-webkit-scrollbar{display:none}
.sug{
  flex-shrink:0;padding:6px 13px;border-radius:var(--pill);
  border:1px solid var(--edge2);font-size:.71rem;font-weight:600;
  cursor:pointer;background:var(--card);color:var(--txt2);white-space:nowrap;transition:.18s;
}
.sug:hover{border-color:rgba(79,142,247,.4);color:var(--sky2);background:rgba(79,142,247,.06)}

/* Lock bar */
.lkbar{padding:10px 16px;background:rgba(245,158,11,.06);border-top:1px solid rgba(245,158,11,.18);font-size:.77rem;color:var(--saffron2);text-align:center;display:none;flex-shrink:0}

/* Input bar */
.ibar{
  padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  border-top:1px solid var(--edge);
  background:rgba(14,14,32,.95);backdrop-filter:blur(20px);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
.ibar textarea{
  flex:1;border:1px solid var(--edge2);border-radius:13px;
  padding:10px 14px;font-family:var(--body);font-size:.87rem;resize:none;outline:none;
  max-height:120px;overflow-y:auto;line-height:1.5;
  background:rgba(255,255,255,.04);color:var(--txt);transition:.2s;
}
.ibar textarea:focus{border-color:rgba(79,142,247,.4);background:rgba(79,142,247,.04)}
.ibar textarea::placeholder{color:var(--txt4)}
.send{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--sky),var(--teal));
  box-shadow:0 3px 14px var(--glow-sky);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.send:hover{transform:scale(1.07);box-shadow:0 5px 20px var(--glow-sky)}
.send:disabled{opacity:.3;transform:none;cursor:not-allowed;box-shadow:none}
.send svg{stroke:#fff;width:17px;height:17px}

/* ═══ TRIP PLANNER ═══ */
.itin-form{
  padding:16px;display:flex;flex-direction:column;gap:10px;
  background:rgba(14,14,32,.8);border-bottom:1px solid var(--edge);flex-shrink:0;
}
.itin-form label{font-size:.7rem;font-weight:600;color:var(--txt3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.07em}

/* Style buttons for travel type — replaces boring dropdowns */
.style-btns{display:flex;flex-wrap:wrap;gap:6px}
.sbtn{
  padding:7px 13px;border-radius:var(--pill);border:1px solid var(--edge2);
  background:var(--card);font-family:var(--body);font-size:.75rem;font-weight:600;
  color:var(--txt3);cursor:pointer;transition:.18s;white-space:nowrap;
}
.sbtn.on{background:linear-gradient(135deg,var(--sky),var(--teal));border-color:transparent;color:#fff;box-shadow:0 2px 12px var(--glow-sky)}
.sbtn:hover:not(.on){border-color:rgba(79,142,247,.35);color:var(--txt2)}

/* Day duration quick buttons */
.day-btns{display:flex;gap:6px;flex-wrap:wrap}
.dbtn{
  flex:1;min-width:48px;padding:8px 6px;border-radius:var(--r3);border:1px solid var(--edge2);
  background:var(--card);font-family:var(--body);font-size:.78rem;font-weight:700;
  color:var(--txt3);cursor:pointer;text-align:center;transition:.18s;
}
.dbtn.on{background:var(--sky);border-color:var(--sky);color:#fff;box-shadow:0 2px 10px var(--glow-sky)}
.dbtn:hover:not(.on){border-color:rgba(79,142,247,.3);color:var(--txt2)}

.itin-interests{
  width:100%;padding:10px 13px;background:rgba(255,255,255,.04);
  border:1px solid var(--edge2);border-radius:var(--r2);
  font-family:var(--body);font-size:.84rem;color:var(--txt);outline:none;transition:.2s;
}
.itin-interests:focus{border-color:rgba(79,142,247,.5);background:rgba(79,142,247,.04)}
.itin-interests::placeholder{color:var(--txt4)}

/* Hidden selects — keep for JS compatibility */
#itin-days,#itin-style{display:none}

.itin-result{flex:1;overflow-y:auto;padding:14px 16px}
.itin-result::-webkit-scrollbar{width:3px}
.itin-result::-webkit-scrollbar-thumb{background:var(--edge2)}
.day-card{
  background:var(--card);border:1px solid var(--edge2);border-radius:var(--r);
  padding:16px;margin-bottom:10px;position:relative;overflow:hidden;
}
.day-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--sky),var(--teal));border-radius:2px 0 0 2px;
}
.day-lbl{font-size:.66rem;font-weight:700;color:var(--sky2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.day-card p{font-size:.83rem;color:var(--txt2);line-height:1.7}
.day-card strong{color:var(--txt);font-weight:700}

/* ═══ BUDGET GUIDE ═══ */
.budget-wrap{padding:16px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.budget-wrap::-webkit-scrollbar{width:3px}

.bc{
  background:var(--card);border:1px solid var(--edge2);border-radius:var(--r);
  padding:15px;transition:.15s;
}
.bc:hover{border-color:var(--edge3)}
.bc.wide{grid-column:1/3}
.bc.hi{
  background:linear-gradient(135deg,rgba(20,20,55,.9),rgba(10,20,50,.95));
  border-color:rgba(79,142,247,.2);
  box-shadow:inset 0 0 40px rgba(79,142,247,.04);
}
.bc.tip{background:rgba(45,212,191,.05);border-color:rgba(45,212,191,.2)}

.bc-cat{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;color:var(--sky2)}
.bc.tip .bc-cat{color:var(--teal)}
.bc-range{font-size:1.05rem;font-weight:800;margin-bottom:4px;font-family:var(--display)}
.bc-note{font-size:.73rem;color:var(--txt3);line-height:1.5}

/* Season selector for budget */
.season-row{display:flex;gap:6px;margin-bottom:0}
.sn-btn{
  flex:1;padding:7px;border-radius:var(--r3);border:1px solid var(--edge2);
  background:var(--card);font-family:var(--body);font-size:.7rem;font-weight:600;
  color:var(--txt3);cursor:pointer;text-align:center;transition:.18s;
}
.sn-btn.on{background:var(--saffron);border-color:var(--saffron);color:#1a0a00}
.sn-btn:hover:not(.on){border-color:rgba(245,158,11,.3);color:var(--saffron2)}

/* ═══ PHRASES ═══ */
.phrases-wrap{padding:14px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.phrases-wrap::-webkit-scrollbar{width:3px}
.psect h3{
  font-family:var(--display);font-size:.72rem;font-weight:700;color:var(--sky2);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;
  display:flex;align-items:center;gap:7px;
}
.psect h3::after{content:'';flex:1;height:1px;background:var(--edge2)}
.plist{display:flex;flex-direction:column;gap:7px}
.pit{
  background:var(--card);border:1px solid var(--edge2);border-radius:var(--r2);
  padding:11px 14px;cursor:pointer;transition:.2s;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.pit:hover{border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.05);transform:translateX(2px)}
.pit:active{transform:translateX(0)}
.p-en{font-size:.84rem;font-weight:600;color:var(--txt)}
.p-loc{font-size:.79rem;color:var(--sky2);margin-top:2px;font-style:italic}
.p-cp{
  font-size:.62rem;color:var(--txt4);flex-shrink:0;
  border:1px solid var(--edge2);padding:3px 8px;border-radius:var(--pill);
  background:var(--lift);transition:.15s;
}
.pit:hover .p-cp{border-color:var(--sky);color:var(--sky2)}

/* ═══ LIST BUSINESS (replaces "Premium") ═══ */
.prem-wrap{padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.prem-wrap::-webkit-scrollbar{width:3px}

.ph{
  background:linear-gradient(135deg,rgba(20,20,60,.95),rgba(10,15,45,.98));
  border:1px solid rgba(79,142,247,.2);border-radius:var(--r);
  padding:24px 20px;text-align:center;
  box-shadow:inset 0 0 60px rgba(79,142,247,.04);
  position:relative;overflow:hidden;
}
.ph::before{
  content:'🏔️';position:absolute;font-size:6rem;opacity:.05;
  top:-20px;right:-20px;line-height:1;pointer-events:none;
}
.ph h2{font-family:var(--display);font-size:1.15rem;font-weight:800;margin-bottom:7px}
.ph p{font-size:.81rem;color:var(--txt2);margin-bottom:18px;line-height:1.6}

.pc-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pc{background:var(--card);border:1px solid var(--edge2);border-radius:var(--r2);padding:16px 12px;text-align:center;position:relative}
.pc.best{border-color:var(--teal);background:rgba(45,212,191,.05)}
.pc .pbadge{
  position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--teal),#34d3b0);
  color:#052a26;font-size:.6rem;font-weight:800;
  padding:3px 12px;border-radius:var(--pill);white-space:nowrap;
}
.pc .pplan{font-size:.75rem;font-weight:700;color:var(--txt2);margin-bottom:4px}
.pc .preal{font-size:.71rem;text-decoration:line-through;color:var(--txt4);margin-bottom:3px}
.pc .pprice{font-family:var(--display);font-size:1.5rem;font-weight:800;margin-bottom:3px}
.pc.best .pprice{color:var(--teal)}
.pc .pper{font-size:.66rem;color:var(--txt3)}

.pfeats{background:var(--card);border:1px solid var(--edge2);border-radius:var(--r);padding:16px}
.pfeats h3{font-size:.79rem;font-weight:700;color:var(--txt2);margin-bottom:11px}
.fr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--edge)}
.fr:last-child{border-bottom:none}
.fi{font-size:.92rem;flex-shrink:0;width:22px;text-align:center}
.ft{font-size:.81rem;color:var(--txt2)}

.pcta{
  background:linear-gradient(135deg,var(--sky),#5B9EFF,var(--teal));
  color:#fff;border:none;border-radius:var(--r2);padding:14px;
  font-family:var(--display);font-size:.9rem;font-weight:700;cursor:pointer;width:100%;
  transition:.2s;box-shadow:0 4px 24px var(--glow-sky);
}
.pcta:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 6px 30px var(--glow-sky)}

/* ═══ TOAST ═══ */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);
  background:rgba(20,20,40,.96);backdrop-filter:blur(16px);
  border:1px solid var(--edge3);color:var(--txt);
  padding:9px 18px;border-radius:var(--pill);
  font-size:.79rem;font-weight:600;z-index:9999;
  opacity:0;transition:all .25s ease;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row,.trow{animation:fadeIn .22s ease forwards}
.cap,.sbtn,.dbtn,.pit,.bc{animation:fadeIn .3s ease both}

/* ═══ SELECT HIDDEN but functional ═══ */
select{display:none}
