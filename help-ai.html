}

  border: 1px solid rgba(255,255,255,0.2);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;

}

  50% { opacity: 0.6; }
}

   QUICK ACTION BUTTONS
   ═════════════════════════════════════════════════════════════ */

}

}

}

  border-radius: 8px;

  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;

}

.qa-btn:hover {

}

}

/* ═════════════════════════════════════════════════════════════
   MESSAGES
   ═════════════════════════════════════════════════════════════ */

.msg-row {
  display: flex;
  gap: 10px;
  animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  align-items: flex-start;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg-row.user {
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
}

.msg-row.user .msg-avatar {
  background: linear-gradient(135deg, var(--secondary), #1a4d2e);
}

.msg-bubble {
  max-width: 85%;
  padding: 12px 14px;
  border-radius: 12px;
  line-height: 1.5;
  font-size: 14px;
  word-wrap: break-word;
  animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.msg-bubble.ai {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.msg-bubble.user {
  background: var(--primary);
  color: white;
}

.msg-bubble strong {
  font-weight: 700;
}

.msg-bubble em {
  font-style: italic;
}

.msg-bubble code {
  background: rgba(0,0,0,0.05);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  font-family: 'Courier New', monospace;
}

.msg-bubble pre {
  background: rgba(0,0,0,0.05);
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
  margin-top: 8px;
}

.msg-bubble a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.msg-bubble.user a {
  color: rgba(255,255,255,0.9);
  border-bottom: 1px solid rgba(255,255,255,0.5);
}

.msg-bubble a:hover {
  opacity: 0.8;
}

.msg-bubble ul {
  list-style: none;
  padding-left: 0;
  margin-top: 8px;
}

.msg-bubble li {
  padding-left: 20px;
  position: relative;
  margin-bottom: 6px;
}

.msg-bubble li:before {
  content: "→";
  position: absolute;
  left: 0;
  color: var(--primary);
  font-weight: 700;
}

.msg-bubble.user li:before {
  color: rgba(255,255,255,0.8);
}

.msg-time {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
  opacity: 0.7;
}

<script>
// ═════════════════════════════════════════════════════════════
// FIREBASE CONFIG
// ═════════════════════════════════════════════════════════════

const firebaseConfig = {
  apiKey: "AIzaSyCYmy_Fy7wWNX4QswV1OgJYpYYPL52IPh4",
  authDomain: "kashmir-stay.firebaseapp.com",
  projectId: "kashmir-stay",
  storageBucket: "kashmir-stay.firebasestorage.app",
  messagingSenderId: "496381581850",
  appId: "1:496381581850:web:acdc04209444e22a404fa3"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// ═════════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════════

let isSignedIn = false;
let currentUser = null;
let conversationHistory = [];
let favorites = JSON.parse(localStorage.getItem('k-favorites')) || [];

// ═════════════════════════════════════════════════════════════
// ATTRACTIONS DATA
// ═════════════════════════════════════════════════════════════

const ATTRACTIONS = [
  { icon: '🏞️', name: 'Dal Lake', info: 'Iconic shikara rides' },
  { icon: '⛷️', name: 'Gulmarg', info: 'Skiing & gondola' },
  { icon: '🌲', name: 'Pahalgam', info: 'Valley adventure' },
  { icon: '❄️', name: 'Sonamarg', info: 'Glacier & camping' },
  { icon: '🏰', name: 'Shalimar Bagh', info: 'Historic gardens' },
  { icon: '🌸', name: 'Tulip Garden', info: 'Spring blooms' },
  { icon: '🏔️', name: 'Aru Valley', info: 'Trekking spot' },
  { icon: '🗻', name: 'Yusmarg', info: 'Mountain meadow' }
];

// ═════════════════════════════════════════════════════════════
// INITIALIZE
// ═════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', function() {
  initializeUI();
  setupAuthListener();
  showWelcome();
  populateAttractions();
});

function initializeUI() {
  const saved = localStorage.getItem('k-user');
  if (saved) {
    currentUser = JSON.parse(saved);
    isSignedIn = true;
    updateAuthUI();
  }
}

// ═════════════════════════════════════════════════════════════
// FIREBASE AUTH LISTENER
// ═════════════════════════════════════════════════════════════

function setupAuthListener() {
  auth.onAuthStateChanged(function(user) {
    if (user) {
      currentUser = {
        uid: user.uid,
        email: user.email,
        displayName: user.displayName || user.email?.split('@')[0],
        photoURL: user.photoURL,
        isAnon: user.isAnonymous
      };
      isSignedIn = true;
      localStorage.setItem('k-user', JSON.stringify(currentUser));
      updateAuthUI();
      closeAuth();
      if (!user.isAnonymous) {
        showToast(`✅ Welcome back, ${currentUser.displayName}!`);
      }
    } else {
      isSignedIn = false;
      currentUser = null;
      localStorage.removeItem('k-user');
      updateAuthUI();
    }
  });
}

// ═════════════════════════════════════════════════════════════
// FIREBASE LOGIN / REGISTER
// ═════════════════════════════════════════════════════════════

function firebaseLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  
  if (!email || !password) {
    showToast('⚠️ Please fill all fields');
    return;
  }
  
  showAuthLoading(true);
  
  auth.signInWithEmailAndPassword(email, password)
    .then(result => {
      showAuthLoading(false);
      showToast('✅ Sign in successful!');
    })
    .catch(error => {
      showAuthLoading(false);
      showToast('❌ ' + error.message);
    });
}

function firebaseRegister() {
  const name = document.getElementById('register-name').value.trim();
  const email = document.getElementById('register-email').value.trim();
  const password = document.getElementById('register-password').value.trim();
  const confirm = document.getElementById('register-confirm').value.trim();
  
  if (!name || !email || !password || !confirm) {
    showToast('⚠️ Please fill all fields');
    return;
  }
  
  if (password !== confirm) {
    showToast('⚠️ Passwords do not match');
    return;
  }
  
  if (password.length < 6) {
    showToast('⚠️ Password must be at least 6 characters');
    return;
  }
  
  showAuthLoading(true);
  
  auth.createUserWithEmailAndPassword(email, password)
    .then(result => {
      return result.user.updateProfile({
        displayName: name
      }).then(() => result);
    })
    .then(result => {
      showAuthLoading(false);
      showToast('✅ Account created successfully!');
    })
    .catch(error => {
      showAuthLoading(false);
      showToast('❌ ' + error.message);
    });
}

function firebaseAnonLogin() {
  showAuthLoading(true);
  
  auth.signInAnonymously()
    .then(() => {
      showAuthLoading(false);
      showToast('✅ Exploring as guest');
    })
    .catch(error => {
      showAuthLoading(false);
      showToast('❌ ' + error.message);
    });
}

function showAuthLoading(show) {
  document.getElementById('auth-form').style.display = show ? 'none' : 'block';
  document.getElementById('auth-loading').style.display = show ? 'block' : 'none';
}

// ═════════════════════════════════════════════════════════════
// AUTH MODAL
// ═════════════════════════════════════════════════════════════

function openAuth() {
  if (isSignedIn) {
    doLogout();
  } else {
    document.getElementById('auth-modal').classList.add('show');
  }
}

function closeAuth() {
  document.getElementById('auth-modal').classList.remove('show');
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form-content').forEach(f => f.style.display = 'none');
  
  if (tab === 'login') {
    document.getElementById('login-form').style.display = 'block';
  } else {
    document.getElementById('register-form').style.display = 'block';
  }
  
  event.target.classList.add('active');
}

function doLogout() {
  auth.signOut().then(() => {
    isSignedIn = false;
    currentUser = null;
    localStorage.removeItem('k-user');
    updateAuthUI();
    showToast('👋 Signed out');
  }).catch(error => {
    showToast('❌ ' + error.message);
  });
}

function updateAuthUI() {
  const btn = document.getElementById('auth-btn');
  if (isSignedIn && currentUser) {
    btn.textContent = `👤 ${currentUser.displayName?.split(' ')[0] || 'Profile'}`;
    btn.style.background = 'var(--secondary)';
  } else {
    btn.textContent = '🔐 Sign In';
    btn.style.background = 'var(--primary)';
  }
}

// ═════════════════════════════════════════════════════════════
// UI FUNCTIONS
// ═════════════════════════════════════════════════════════════

function showWelcome() {
  const chat = document.getElementById('chat-area');
  chat.innerHTML = \`
    <div class="msg-row">
      <div class="msg-avatar" style="background: linear-gradient(135deg, var(--primary), var(--accent));">🏔️</div>
      <div>
        <div class="msg-bubble ai">
          <h3 style="margin-bottom: 8px; font-family: 'Playfair Display', serif;">Welcome to K.S AI Premium!</h3>
          <p>I'm your personal Kashmir travel guide. Whether you're planning your first trip or exploring hidden gems, I'm here to help!</p>
          <div class="suggestions">
            <button class="suggestion-btn" onclick="sendMessage('Plan a 5-day Kashmir trip')">5-Day Itinerary</button>
            <button class="suggestion-btn" onclick="sendMessage('Best hotels in Srinagar')">Hotels</button>
            <button class="suggestion-btn" onclick="sendMessage('Local restaurants')">Restaurants</button>
            <button class="suggestion-btn" onclick="sendMessage('What to pack')">Packing Tips</button>
          </div>
        </div>
        <div class="msg-time" style="text-align: right;">Just now</div>
      </div>
    </div>
  \`;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  
  const chat = document.getElementById('chat-area');
  if (tab === 'chat') {
    showWelcome();
  } else if (tab === 'itinerary') {
    chat.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text2);">📋 Use the chat to generate your perfect itinerary</div>';
  } else if (tab === 'favorites') {
    showFavorites();
  } else if (tab === 'tips') {
    showLocalTips();
  }
}

function populateAttractions() {
  const list = document.getElementById('attractions-list');
  list.innerHTML = ATTRACTIONS.map(attr => \`
    <div class="attraction-card" onclick="sendMessage('Tell me about \${attr.name}')">
      <div class="attraction-icon">\${attr.icon}</div>
      <div class="attraction-name">\${attr.name}</div>
      <div class="attraction-info">\${attr.info}</div>
    </div>
  \`).join('');
}

function showFavorites() {
  const chat = document.getElementById('chat-area');
  if (favorites.length === 0) {
    chat.innerHTML = '<div style="padding: 40px 20px; text-align: center; color: var(--text2);">❤️ No saved items yet. Click the heart icon to save attractions!</div>';
  } else {
    chat.innerHTML = favorites.map(fav => \`
      <div class="day-card">
        <div class="attraction-icon">\${fav.icon}</div>
        <div class="day-label">\${fav.name}</div>
        <p>\${fav.info}</p>
      </div>
    \`).join('');
  }
}

// ═════════════════════════════════════════════════════════════
// MESSAGING
// ═════════════════════════════════════════════════════════════

function handleKeyPress(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage(msg) {
  const input = document.getElementById('msg-input');
  const text = (msg || input.value).trim();
  
  if (!text) return;
  
  addMessage('user', text);
  input.value = '';
  conversationHistory.push({ role: 'user', content: text });
  
  addTypingIndicator();
  
  setTimeout(() => {
    removeTypingIndicator();
    const response = generateAIResponse(text);
    addMessage('ai', response);
    conversationHistory.push({ role: 'assistant', content: response });
  }, 800 + Math.random() * 500);
}

function quickAction(action) {
  const actions = {
    'destinations': 'What are the top destinations to visit in Kashmir?',
    'hotels': 'Recommend budget & luxury hotels in Srinagar',
    'restaurants': 'Best local restaurants for authentic Kashmiri food',
    'activities': 'What activities are suitable for adventure lovers?',
    'transport': 'How to get around Kashmir? Transport options?',
    'weather': 'What is the weather like now? What should I pack?',
    'budget': 'What is the daily budget needed for Kashmir?',
    'safety': 'Is Kashmir safe for tourists? Any precautions?'
  };
  sendMessage(actions[action] || 'Tell me more');
}

function addMessage(role, text) {
  const chat = document.getElementById('chat-area');
  const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  
  const row = document.createElement('div');
  row.className = \`msg-row \${role === 'user' ? 'user' : ''}\`;
  
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🏔️';
  
  const bubble = document.createElement('div');
  bubble.className = \`msg-bubble \${role === 'user' ? 'user' : 'ai'}\`;
  bubble.innerHTML = formatText(text);
  
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = time;
  
  if (role === 'user') {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }
  
  chat.appendChild(row);
  chat.appendChild(timeEl);
  chat.scrollTop = chat.scrollHeight;
}

function addTypingIndicator() {
  const chat = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'typing-indicator';
  row.innerHTML = \`
    <div class="msg-avatar">🏔️</div>
    <div class="msg-bubble ai" style="background: var(--card);">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  \`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTypingIndicator() {
  const indicator = document.getElementById('typing-indicator');
  if (indicator) indicator.remove();
}

function formatText(text) {
  let html = text;
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  return html;
}
