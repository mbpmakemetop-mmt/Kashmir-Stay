        * {

        :root {

        body {

        }

        header p {

        }

        .breadcrumb {

            padding: 12px 20px;

            font-size: 0.9em;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            margin: 0 5px;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Filters & Search */
        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .filter-category {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background-color: white;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: var(--text-dark);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background-color: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Blog Posts Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .blog-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .blog-card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
        }

        .blog-card-content {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-card-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.85em;
            color: var(--text-light);
            flex-wrap: wrap;
        }

        .blog-card-category {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.75em;
        }

        .blog-card h3 {
            font-size: 1.4em;
            margin-bottom: 12px;
            color: var(--text-dark);
            line-height: 1.4;
        }

        .blog-card-description {
            color: var(--text-light);
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.6;
            flex: 1;
        }

        .blog-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .read-more-btn {
            background-color: var(--secondary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s;
            display: inline-block;
        }

        .read-more-btn:hover {
            background-color: var(--accent-color);
        }

        .read-time {
            font-size: 0.85em;
            color: var(--text-light);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .no-results h3 {
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid var(--bg-light);
            border-top: 4px solid var(--secondary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
        }

        footer a {
            color: var(--secondary-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .blog-header {
                flex-direction: column;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            .filter-category {
                justify-content: center;
            }
        }

        /* Accessibility */
        a:focus,
        button:focus {
            outline: 2px solid var(--secondary-color);
            outline-offset: 2px;
        }
    </style>
</head>

];
        // DOM Elements
        const blogContainer = document.getElementById('blogContainer');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const noResults = document.getElementById('noResults');

        let currentFilter = 'all';
        let currentSearch = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderBlogPosts();
            setupEventListeners();
        });

        // Setup Event Listeners
        function setupEventListeners() {
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderBlogPosts();
            });

            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderBlogPosts();
                });
            });
        }

        // Filter and render blog posts
        function renderBlogPosts() {
            let filteredPosts = blogPosts;

            // Apply category filter
            if (currentFilter !== 'all') {
                filteredPosts = filteredPosts.filter(post => post.category === currentFilter);
            }

            // Apply search filter
            if (currentSearch) {
                filteredPosts = filteredPosts.filter(post =>
                    post.title.toLowerCase().includes(currentSearch) ||
                    post.description.toLowerCase().includes(currentSearch)
                );
            }

            // Render results
            if (filteredPosts.length === 0) {
                blogContainer.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                blogContainer.style.display = 'grid';
                noResults.style.display = 'none';
                blogContainer.innerHTML = filteredPosts.map(post => createBlogCard(post)).join('');
            }
        }

        // Create blog card HTML
        function createBlogCard(post) {
            return `
                <article class="blog-card" itemscope itemtype="https://schema.org/BlogPosting">
                    <div class="blog-card-image">${post.emoji}</div>
                    <div class="blog-card-content">
                        <div class="blog-card-meta">
                            <span class="blog-card-category">${post.category.toUpperCase()}</span>
                            <time datetime="${post.date}" itemprop="datePublished">${new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</time>
                        </div>
                        <h3 itemprop="headline">${post.title}</h3>
                        <p class="blog-card-description" itemprop="description">${post.description}</p>
                        <div class="blog-card-footer">
                            <a href="${post.url}" class="read-more-btn" itemprop="url">Read More</a>
                            <span class="read-time">${post.readTime}</span>
                        </div>
                    </div>
                </article>
            `;
        }
    </script>
